server:
  port: 8081
  address: 0.0.0.0

spring:
  application:
    name: rest-server

  security:
    user:
      name: admin
      password: ${ADMIN_PASS}

  # standard spring Boot datasource config
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    #url: jdbc:postgresql://database-postgres.chams8ws6974.ap-southeast-1.rds.amazonaws.com:5432/postgres
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: DaodaoDockerHikariCP
      mmaximum-pool-size: 10       # max connection num
      minimum-idle: 5            # max idel connection num ≤ maximum-pool-size
      connection-timeout: 5000   # retrieve connection timeout
      idle-timeout: 60000        # idle connection timeout
      max-lifetime: 600000       # max connection lifetime
      leak-detection-threshold: 60000 # leak detection threshold

# JWT configuration
jwt:
  secret: MyVerySecureSecretKeyForJWTTokenGeneration123456789
  expiration: 86400000  # 24 hours in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"  # expose all endpoints，can also expose points such as "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always  # show details, other options: never, when-authorized

# SpringDoc OpenAPI configuration
springdoc:
  # Only scan specific controller package
  packages-to-scan: org.daodao.restserver.controller
  # Only match specific API paths
  paths-to-match: /api/**
  # Enable Swagger UI
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  # Enable API docs endpoint
  api-docs:
    enabled: true
    path: /v3/api-docs




